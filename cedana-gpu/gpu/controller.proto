syntax = "proto3";

package gpu;

import "gpu/health.proto";

service Controller {
  rpc Freeze(FreezeReq) returns (FreezeResp) {}
  rpc Unfreeze(UnfreezeReq) returns (UnfreezeResp) {}

  rpc Dump(DumpReq) returns (DumpResp) {}
  rpc Restore(RestoreReq) returns (RestoreResp) {}
  rpc HealthCheck(HealthCheckReq) returns (HealthCheckResp) {}

  rpc Info(InfoReq) returns (InfoResp) {}

  // Only use if forcefully attaching to a PID, so that the Info RPC will return this PID.
  rpc Attach(AttachReq) returns (AttachResp) {}
}

message AttachReq {
  uint32 PID = 1; // PID of the process to forcefully attach to the controller
}

message AttachResp {}

message FreezeReq {}

message FreezeResp {}

message UnfreezeReq {}

message UnfreezeResp {}

message DumpReq {
  string Dir = 1;
  bool Stream = 2;
  bool LeaveRunning = 3;
}

message DumpResp {
  GpuProfile Profile = 1;
}

message RestoreReq {
  string Dir = 1;
  bool Stream = 2;
}

message RestoreResp {
  RestoreStats RestoreStats = 1;
  GpuProfile Profile = 2;
}

message RestoreStats {
  int64 CopyMemTime = 1; // in milliseconds
  int64 ReplayCallsTime = 2; // in milliseconds
  int64 CopyHostMemTime = 3; // in milliseconds
}

message GpuProfile {
  repeated WorkerProfile Workers = 1;
  WorkerProfileSummary Summary = 2;
  repeated GpuFunctionProfile Functions = 3;
}

message GpuFunctionProfile {
  string Name = 1;
  int64 DurationMs = 2;
  uint32 Count = 3; // number of workers
  int64 TotalDurationMs = 4; // sum across all workers
  uint64 Bytes = 5; // total bytes written during dump, bytes read during restore
}

message WorkerProfile {
  int32 WorkerIndex = 1;
  uint32 PID = 2;
  int64 DurationMs = 3;
  uint64 Bytes = 4; // bytes written during dump, bytes read during restore
  repeated WorkerPhaseProfile Phases = 5;
}

message WorkerPhaseProfile {
  string Name = 1;
  int64 DurationMs = 2;
  uint64 Bytes = 3; // bytes written during dump, bytes read during restore
}

message WorkerProfileSummary {
  uint32 Count = 1;
  int64 AverageDurationMs = 2;
  int32 SlowestWorkerIndex = 3;
  uint32 SlowestPID = 4;
  int64 SlowestDurationMs = 5;
  uint64 TotalBytes = 6; // bytes written during dump, bytes read during restore
  repeated WorkerPhaseProfileSummary Phases = 7;
}

message WorkerPhaseProfileSummary {
  string Name = 1;
  uint32 Count = 2;
  int64 AverageDurationMs = 3;
  int32 SlowestWorkerIndex = 4;
  uint32 SlowestPID = 5;
  int64 SlowestDurationMs = 6;
  int64 TotalDurationMs = 7;
  uint64 TotalBytes = 8; // total bytes written during dump, bytes read during restore
  uint64 AverageBytes = 9; // average bytes per worker
  uint64 SlowestBytes = 10; // bytes for the slowest worker
}

message InfoReq {}

message InfoResp {
  uint32 PID = 1; // PID of the controller process
  uint32 AttachedPID = 2; // PID of the process that is attached to the controller, 0 if none attached
  uint64 ShmSize = 3; // Size of the shared memory segment used for IPC
  string ShmName = 4; // Name of the shared memory segment used for IPC
  string Version = 5; // Version of the controller
}
